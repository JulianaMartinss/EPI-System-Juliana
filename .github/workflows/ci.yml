name: Django Tests

on:
  push:
    branches: [ main, epi ]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django selenium

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: pytest
